launcher.step.unpacking-natives=Распакаванне бібліятэк гульні...
launcher.step.deleting-entries=Ужыванне магіі...
launcher.step.constructing=Стварэнне працэсу гульні...
# Launcher warning
launcher.warning.title=Папярэджанне
launcher.warning.incompatible.environment=Выбраная версія Minecraft несумяшчальная з вашым камп'ютарам, але будзе зроблена спроба яе запуску.
launcher.warning.incompatible.launcher=Legacy Launcher несумяшчальны з выбранай версіяй Minecraft, але будзе зроблена спроба яе запуску.
launcher.warning.assets=Пры загрузцы рэсурсаў адбылася памылка. Магчыма, гэта звязана з Вашым антывірусам.\nГэтае паведамленне зноў будзе паказана пасля перазапуску лаўнчара. Памятайце, што не ўсе файлы былі загружаны.
launcher.warning.assets.kaspersky=Пры загрузцы рэсурсаў адбылася памылка. Магчыма, на Вашым камп'ютары ўсталяваны Анты-Банер Касперскага. Калі гэта так, то каб вырашыць праблему, дадайце ў выключэнні Анты-Банера наступны шлях:
launcher.warning.assets.long.title=Занадта доўгая праверка
launcher.warning.assets.long=Праверка аднаго файла ідзе занадта доўга. Магчыма, файлавая сістэма пашкоджана. Калі ласка, праверце дыск на наяўнасць памылак.
launcher.warning.jre-platform-unknown=Ваша платформа не падтрымліваецца лаўнчарам. Мы можам паспрабаваць працягнуць запуск гульні, але хутчэй за ўсё нічога не запрацуе.
launcher.warning.jre-platform-unsupported=Ваша платформа не падтрымліваецца дадзенай версіяй Minecraft. Мы можам паспрабаваць працягнуць запуск гульні, але хутчэй за ўсё нічога не запрацуе.
launcher.warning.jre-manifest-unavailable.use-local=Не ўдалося запытаць файлы для патрабаванай JRE.\nАле мы знайшлі ўжо ўсталяваную JRE, якая можа быць старэйшай, чым трэба.\n\nМы можам працягнуць запуск з ёй, але, магчыма, нічога не запрацуе. Працягнуць?
launcher.warning.jre-manifest-unavailable.use-current=Не ўдалося запытаць файлы для патрабаванай JRE.\n\nМы можам працягнуць запуск з JRE, якая выкарыстоўваецца лаўнчарам, але, магчыма, нічога не запрацуе. Працягнуць?
launcher.warning.jre-not-found=Не ўдалося знайсці патрабаванае JRE для дадзенай версіі Minecraft.\n\nМы можам паспрабаваць запусціць гульню з JRE, якое выкарыстоўваецца зараз лаўнчарам, але, імаверна, гэта можа не спрацаваць і гульня проста не запусціцца. Працягнуць?
launcher.warning.jre-will-take-remaining-space=Для бягучай версіі Minecraft трэба ўсталяваць JRE, але на вашым дыску, верагодна, засталося вельмі мала месца. Калі ласка, вызваліце хаця б %0 Мбайт.\n\nНацісніце «Так», каб працягнуць усталяванне.
# Crashes
crash.error.title=О_о
crash.error=Модуль, які адказвае за аналіз Крашаў, крашнуўся. Да такога жыццё нас не рыхтавала.\n\nДапамажыце нам выправіць гэтае прыкрае непаразуменне: адпраўце нам логі на ўказаны ніжэй E-mail (або, напрыклад, у <a href="https://llaun.ch/vk">паблік Укантакце</a>, не важна).\n\nДля гэтага адкрыйце налады лаўнчара, выберыце ўкладку «Legacy Launcher» і ўключыце Часопіс падзей. Захавайце яго змесціва любым зручным для Вас спосабам і адпраўце нам вынік, мы будзем удзячныя.\n\nE-mail падтрымкі:
crash.loading.title=Нешта зламалася...
crash.loading.head=Калі ласка, пачакайце, мы спрабуем высветліць што адбылося...
crash.buttons.logs=Адкрыць логі
crash.buttons.support=Патрэбна дапамога?
crash.buttons.exit=Выхад
crash.buttons.open-settings=Адкрыць налады
crash.buttons.disable-optimized=Адкл. апт. аргументы
crash.buttons.fix-heap=Скінуць памяць
crash.buttons.install-java64=Усталяваць Java x64
crash.buttons.open-mods=Адкрыць тэчку mods
crash.buttons.update-java=Абнавіць Java
crash.actions.set-options=Налады Minecraft паспяхова зменены
crash.buttons.force-update=«Абнавіць кліент»
crash.unknown.title=Нешта зламалася...
crash.unknown.body=Выкананне Minecraft спынілася з-за пакуль невядомай нам памылкі. Магчыма, нешта няправільна наладжана, ці вам проста «пашанцавала» :)<br/><br/>Дарэчы, дадзеная з'ява цалкам нармальная (для Minecraft), усе гульцы рана ці позна праз гэта праходзяць.<br/><br/>Вы можаце паспрабаваць высветліць прычыны самастойна або папрасіць дапамогі ў нашай невялікай каманды падтрымкі.
crash.metaspace.title=Памылка вылучэння памяці
crash.metaspace.body=Адбылася памылка пры выкарыстанні Metaspace. Гэтая памылка звычайна праяўляецца пры ўсталяванні старонніх праграм, якія выкарыстоўваюць накладанні (аверлеі), тыпу Discord і GeForce Experience. Адключыце аверлей і паспрабуйце наноў.
crash.oom-x86.title=Недастаткова памяці
crash.oom-x86.body=Адбылася памылка, якая прывяла да выдаткоўвання ўсёй свабоднай памяці, вылучанай пад Minecraft.\n\nБыло выяўлена, што Minecraft запушчаны з дапамогай 32-бітнай Java, хоць сама сістэма працуе ў 64-бітным рэжыме. Памяняйце JRE на рэкамендаваную або ўсталюйце 64-бітную Java.
crash.oom.title=Недастаткова памяці
crash.oom.body=Адбылася памылка, якая прывяла да выдаткоўвання ўсёй свабоднай памяці, вылучанай пад Minecraft.\n\nПаспрабуйце (1) адключыць аптымізаваныя аргументы. Калі гэта не дапаможа, (2) змяніце колькасць вылучанай памяці ў наладах.
crash.heap-x86.title=Вылучана занадта шмат памяці
crash.heap-x86.body=Ваша сістэма 64-бітная, але ў дадзены момант выкарыстоўваецца 32-бітная Java: у ёй рэдка ўдаецца вылучыць больш за 1.5 Гбайт АЗП.\n\nКаб вырашыць праблему, ўсталюйце 64-бітную Java або паменшыце вылучэнне памяці.
crash.heap-x86.buttons.open-settings=Адкрыць налады
crash.heap.title=Вылучана занадта шмат памяці
crash.heap.body=Java не змагла вылучыць такую колькасць памяці.\n\nКаб вырашыць праблему, адкрыйце налады і паменшыце вылучэнне памяці.
crash.invalid-username.title=Некарэктная тэчка
crash.invalid-username.body=Прыкладанні Java не працуюць у тэчках, у шляхах якіх ёсць клічнік («!»).\n\nАдкрыйце налады і змяніце дырэкторыю Minecraft.
crash.firewall-block.title=Праблемы з антывірусам
crash.firewall-block.body=Стварэнне сервера было заблакавана Вашым антывірусным ПЗ або брандмаўэрам.\n\nАдключыце вышэйуказаныя праграмы і паспрабуйце зноў.\n\nКалі ў Вас усталяваны avast! мае сэнс паспрабаваць пераўсталяваць яго цалкам, бо памылка можа быць выклікана некарэктным усталяваннем.
crash.server-resource-pack.title=Памылка загрузкі рэсурс-пака
crash.server-resource-pack.body=Не ўдалося загрузіць рэсурс-пак з сервера. Прычыны гэтай памылкі невядомыя.\n\nПаспрабуйце падключыцца да сервера яшчэ раз праз меню Сеткавай гульні, адкрыўшы Minecraft самастойна.
crash.incorrent-mods-version.title=Знойдзены несумяшчальныя моды
crash.incorrent-mods-version.body=Выяўлены моды для іншай версіі гульні.\nКалі ласка, выдаліце гэтыя моды або выкарыстоўвайце версію гульні, адпаведную гэтым модам - тады гульня зможа запусціцца.
crash.codechicken-core-missing.title=Не знойдзены CodeChickenCore
crash.codechicken-core-missing.body=Для некаторых модаў патрабуецца CodeChickenCore. Спампуйце яго і ўсталюйце.
crash.codechicken-core-missing.buttons.download=Спампаваць CodeChickenCore
crash.graphics.general.title=Несумяшчальныя драйверы
crash.graphics.general.body=Minecraft быў закрыты з-за несумяшчальнасці з драйверамі відэакарты і/або непадтрымоўванай версіі OpenGL.\n\nНам не ўдалося вызначыць мадэль Вашага графічнага працэсара. Звяжыцеся з адміністратарам камп'ютара.
crash.graphics.intel.downgrade-to-jre8u60.title=Несумяшчальная версія Java
crash.graphics.intel.downgrade-to-jre8u60.body=У дадзены момант вядома аб праблеме сумяшчальнасці новых версій Java, запушчаных на Windows, з драйверамі Intel для чыпсэтаў 1га і 2га пакаленняў.\n\nКаб вырашыць гэтую праблему Вы можаце ўсталяваць Java 8u60 замест той версіі, якая зараз усталявана.
crash.graphics.intel.buttons.downgrade-to-jre8u60=Усталяваць Java 8 Update 60
crash.graphics.intel.1.10.title=Памылка драйвераў Intel
crash.graphics.intel.1.10.body=Ваша праблема звязана з няправільнай працай драйвераў Intel. Вы можаце паспрабаваць наступнае:\n\n1) Абнавіць драйверы Intel\n2) Максімальна павялічыць вылучэнне памяці ў наладах лаўнчара\n3) Уключыць VSync (вертыкальную сінхранізацыю) і адключыць VBOs у наладах самой гульні.
crash.graphics.update-driver.title=Абнавіце драйверы %0
crash.graphics.update-driver.body=Магчыма, Ваша сістэма выкарыстоўвае састарэлыя графічныя драйверы %0.\n\nКаб вырашыць праблему, варта абнавіць іх.
crash.graphics.buttons.driver-update=Абнавіць драйверы %0
crash.graphics.buttons.intel-nvidia-select=Як наладзіць выкарыстанне NVIDIA?
crash.graphics.buttons.intel-amd-select=Як наладзіць выкарыстанне AMD?
crash.arch.title=Несумяшчальнасць архітэктур
crash.arch.body=Адбылася памылка, якая звязана з тым, што ў Вас усталявана 32-бітная Java на 64-бітнай сістэме. Калі ласка, ўсталюйце 64-бітную Java каб пазбегнуць далейшых праблем.
crash.extracted-mods-found.title=Распакаваныя моды
crash.extracted-mods-found.body=Forge выявіў распакаваныя моды. Калі ласка, выдаліце ўсе лішнія файлы і тэчкі з тэчкі "mods" і паспрабуйце запусціць Minecraft зноў.
crash.analyzer.errored-mod.title=Памылка ў %0
crash.analyzer.errored-mod.body.single=Адбылася памылка ў модзе <b>«%0»</b> (%1)\n\nВы можаце вывучыць логі, каб зразумець прычыны праблемы, якая ўзнікла, або звярнуцца да нас па дапамогу.\n\nКалі Вам не важная наяўнасць гэтага мода, яго можна выдаліць.
crash.analyzer.errored-mod.body.multiple=Адбыліся памылкі ў наступных модах:\n%0\nВы можаце вывучыць логі, каб зразумець іх прычыны, або звярнуцца да нас па дапамогу.
crash.analyzer.buttons.errored-mod-delete.single=Выдаліць мод
crash.analyzer.buttons.errored-mod-delete.multiple=Выдаліць моды
crash.analyzer.buttons.errored-mod-delete.error.title=Не выдалена
crash.analyzer.buttons.errored-mod-delete.error.no-mods-folder=Тэчка mods не знойдзена. Выдаліце мод самастойна.
crash.analyzer.buttons.errored-mod-delete.error.could-not-delete=Файл не быў выдалены. Калі ласка, выдаліце яго самастойна:
crash.analyzer.buttons.errored-mod-delete.success.title=Выдалена паспяхова
crash.analyzer.buttons.errored-mod-delete.success.single=Файл мода выдалены. Паспрабуйце запусціць Minecraft зноў.
crash.analyzer.buttons.errored-mod-delete.success.multiple=Файлы паспяхова выдалены. Паспрабуйце запусціць Minecraft зноў.
crash.shadersmod-detected.title=Выяўлены Shadersmod
crash.shadersmod-detected.body=OptiFine выявіў наяўнасць Shadermod. Калі ласка, выдаліце яго, бо OptiFine падтрымлівае шэйдары самастойна.
crash.unsupported-java-version.title=Несумяшчальная версія Java
crash.unsupported-java-version.body=Усталяваная версія Java з'яўляецца састарэлай для дадзенай версіі Minecraft.\nНастойліва рэкамендуецца абнавіць Java да пазнейшай версіі.
crash.update-optifine.title=Стары OptiFine
crash.update-optifine.body=Выкарыстоўваецца састарэлая версія OptiFine.\nАбнавіце яе або выдаліце дадзены мод.
crash.update-optifine.buttons.update=Абнавіць OptiFine
crash.fastcraft-optifine.title=Канфлікт OptiFine і FastCraft
crash.fastcraft-optifine.body=Бягучыя версіі дадзеных модаў канфліктуюць і не з'яўляюцца сумяшчальнымі. Паспрабуйце выдаліць адзін з іх або, калі больш новыя версіі ўжо сумяшчальныя, абнавіце іх.
crash.mods-duplicate.title=Дублікаты модаў?
crash.mods-duplicate.body=Магчыма, у тэчцы "mods" ёсць дублікаты модаў. Напрыклад, два аднолькавыя моды, але проста розных версій.\nКалі ласка, праверце вашу тэчку mods.
crash.jre9-and-above-not-supported.title=Няма падтрымкі Java 9 і вышэй
crash.jre9-and-above-not-supported.body=Такія мадыфікацыі як Forge, OptiFine і іншыя не падтрымліваюць Java версіі 9.0 і навей.\nВыкарыстоўвайце Java 8 або праверце наяўнасць больш новых версій усталяваных модаў: у іх, магчыма, падтрымка новых версій Java ўжо ёсць.\nАльтэрнатыўна, у наладах лаўнчара змяніце JVM на "рэкамендаваную".
crash.memory-leak.title=Уцечка памяці?
crash.memory-leak.body=Выканальная праграма (Java) выявіла, што памяць была пашкоджана.\nКалі гэтая праблема адбываецца дастаткова часта, паспрабуйце:\n1) Адключыць VBOs у наладах графікі ў Minecraft\n2) Павялічыць аб'ём памяці ў наладах лаўнчара\n3) Пераўсталяваць Java\n4) Як раіць афіцыйны баг-трэкер Mojang, выдаліць праграму D3DGear (калі ўсталявана)
crash.memory-leak.buttons.disable-vbos=Адключыць VBOs
crash.bad-mainclass.title=Не знойдзены галоўны клас
crash.bad-mainclass.body=Minecraft не быў запушчаны, бо JVM не змагла знайсці галоўны клас. Магчыма, JAR-файл пашкоджаны.\nПаспрабуйце запусціць дадзеную версію з адзначанай птушачкай «Абнавіць кліент», каб загрузіць усе даныя наноў.
crash.bad-mainclass.check-javaargs.title=Праверце аргументы
crash.bad-mainclass.check-javaargs.body=Minecraft не быў запушчаны, бо JVM не змагла знайсці галоўны клас.\nМы выявілі, што Вашы налады сапраўды могуць перашкодзіць запуску Minecraft: калі ласка, зайдзіце ў налады і праверце поле "JVM-аргументы".
crash.bad-mainclass.buttons.clear-javaargs=Скінуць JVM-аргументы
crash.java16.title=Патрабуецца больш новая Java.
crash.java16.body=Адбылася памылка з выбарам версіі Java. Паспрабуйце яшчэ раз, альбо націсніце «Патрэбна дапамога?» і мы вам пастараемся дапамагчы.
crash.java16.old-java.title=Патрабуецца Java %0
crash.java16.old-java.body=Для гэтай версіі Minecraft патрабуецца Java %0. Запуск з бягучай версіяй немагчымы.
crash.java16.old-java.version.unknown=невядомай версіі
crash.java16.old-java.version.guessed=(магчыма)
crash.java16.change-to-recommended.title=Патрабуецца Java %0
crash.java16.change-to-recommended.body=Для гэтай версіі Minecraft патрабуецца Java %0. Памяняйце Java, якая выкарыстоўваецца, на «Рэкамендаваную» ў наладах.
crash.java16.force-update-version.title=Абнавіце кліент
crash.java16.force-update-version.body=Мяркуючы па ўсім, вы запускалі лаўнчар больш старой версіі, таму інфармацыя аб абнаўленні на Java 16 была страчана. Пераўсталюйце гэтую версію Minecraft, клікнуўшы «Абнавіць кліент».
crash.java16.buttons.retry-with-recommended=Паспрабаваць з «Рэкамендаванай» Java
