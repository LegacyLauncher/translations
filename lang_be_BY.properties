notifier.failed=Legacy Launcher не змог праверыць наяўнасць абнаўленняў. Магчымыя рашэнні:\n- Праверце падключэнне да сеткі Інтэрнэт\n- Праверце налады даты/часу\n- Праверце сістэмныя налады проксі, калі Вы падключаецеся да Інтэрнэту праз яго\n- Праверце налады антывіруса: паспрабуйце адключыць яго на час гульні, каб пацвердзіць асцярогі.\n- Калі ў Вас увогуле няма Інтэрнэту, можаце не звяртаць увагі на гэтае паведамленне.\n\nГэта, хутчэй за ўсё, лакальная праблема, таму некалькі разоў усё праверце, перш чым да кагосьці звяртацца.
