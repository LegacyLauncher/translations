connectivity.warning.body.text=Лаўнчар выявіў праблемы са злучэннем з некаторымі сэрвісамі, таму яго функцыі могуць быць абмежаваны.
connectivity.warning.body.link=Патрэбна дапамога? »
connectivity.warning.body.empty=<b>Ніводзін сэрвіс недаступны</b>.<br/><br/>Лаўнчар не змог падключыцца ні да аднаго сэрвісу. Многія функцыі, хутчэй за ўсё, будуць недаступныя.<br/><br/>Калі вы падключаны да Інтэрнэту, праверце ваш антывірус або звярніцеся да адміністратара вашага камп'ютара.
connectivity.warning.list.name.repo=Рэпазіторыі Legacy Launcher
connectivity.warning.list.hint.repo=Магчымыя праблемы з загрузкай такіх версій Minecraft, як OptiFine, Forge і Fabric
