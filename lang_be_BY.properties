launcher.error.index-file=Памылка чытання файла індэксаў.\nПаспрабуйце адключыць антывірус і перазапусціць гульню, адзначыўшы птушачку «Абнавіць кліент».
launcher.error.reconstruct-assets=Памылка пры стварэнні віртуальнай тэчкі. Паспрабуйце яшчэ раз.
launcher.error.migrate-assets=Адбылася памылка пры спробе скапіяваць старыя рэсурсы. Звярніце ўвагу: гэтая памылка можа быць выклікана, напрыклад, раптоўным адключэннем сілкавання падчас працы камп'ютара, што стала прычынай пашкоджання файлавай сістэмы. Калі ласка, выканайце сканіраванне на наяўнасць памылак на дыску.
launcher.error.unpack-natives=Адбылася памылка пры распакаванні натыўных бібліятэк.\nАдзначце птушачку «Абнавіць кліент», каб загрузіць іх наноў.
launcher.error.java-exec=Немагчыма знайсці выканальны файл Java:
launcher.error.folder-not-found=Немагчыма знайсці тэчку Minecraft:
launcher.error.version-not-found=Немагчыма знайсці версію Minecraft, якая запускаецца:
launcher.error.account-invalid=Некарэктнае імя акаўнта:
launcher.error.account-not-found=Немагчыма знайсці выбраны акаўнт:
launcher.error.start=Адбылася памылка пры запуску Java-машыны.
launcher.error.exec-not-found=Выканальны файл не знойдзены. Пераканайцеся, што ў наладах лаўнчара ўказаны правільны шлях да выканальнага файла Java або выберыце "рэкамендаваную" JVM.
launcher.error.download=Пры загрузцы неабходных файлаў для гульні адбылася памылка.
launcher.error.classpath=Не знойдзены патрабаваны файл\nКалі Вы не можаце яго аднавіць, пастаўце сцяжок «Абнавіць кліент»:
launcher.error.version-info=Немагчыма прыняць інфармацыю пра версію!
launcher.error.incompatible=Бягучая версія Legacy Launcher не зможа запусціць гэтую версію Minecraft. Калі ласка, абнавіце Legacy Launcher.
launcher.error.delete-entries=Памылка пры выдаленні файлаў з JAR-архіва версіі. Паспрабуйце пераўсталяваць версію з дапамогай «Абнавіць кліент».
launcher.error.mcleaks-unsupported=Акаўнты MCLeaks не падтрымліваюцца ў гэтым асяроддзі выканання. Выберыце іншы акаўнт і паспрабуйце запусціць Minecraft зноў.
launcher.error.free-space-java=Недастаткова месца на цвёрдым дыску. Калі ласка, вызваліце ўказаную ніжэй колькасць месца для ўсталявання патрабаванай версіі Java.
launcher.error.free-space=Недастаткова месца на цвёрдым дыску. Калі ласка, вызваліце як мінімум 512 Мбайт для гульні ў Minecraft.
launcher.error.no-selected-java=Не ўдаецца знайсці выбраную Java. У наладах у полі "Java" выберыце "Выкарыстоўваць бягучую" і паўтарыце спробу.
launcher.error.could-not-download-java=Не ўдалося ўсталяваць выбраную Java.
launcher.error.could-not-fetch-complete-version=Не ўдалося атрымаць даныя аб гэтай версіі Minecraft. Праверце падключэнне да Інтэрнэту.
# Launcher steps
launcher.step.collecting=Збор інфармацыі аб гульні...
launcher.step.comparing-assets=Праверка рэсурсаў гульні...
launcher.step.comparing-assets-long=Праверка рэсурсаў, можа заняць час...
launcher.step.checking-jre=Праверка Java...
launcher.step.downloading=Загрузка рэсурсаў гульні...
