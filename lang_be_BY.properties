account.manager.multipane.add-account-mcleaks.description.body=<img src="${image:logo-mcleaks@16.png}" width="${size:16}" height="${size:16}" />&nbsp;<b>MCLeaks.net</b> – бясплатная сістэма раздачы доступу да акаўнтаў <img src="${image:logo-mojang@16.png}" width="${size:16}" height="${size:16}" />&nbsp;<b>Mojang</b>.<br/><br/>З яе дапамогай Вы зможаце гуляць на серверах, якія прымаюць толькі <b>Premium</b>-гульцоў (напрыклад, Hypixel або GommeHD).
