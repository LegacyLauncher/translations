account.manager.error.ely.fetch-code=Не ўдалося абмяняць код аўтарызацыі.
account.manager.error.mojang.invalid-credentials=Не ўдалося аўтарызавацца, выкарыстоўваючы дадзены акаўнт. Калі ласка, увайдзіце яшчэ раз у меню, якое адкрылася.\n\nКалі гэтая памылка адбываецца занадта часта, то, магчыма, да Вашага акаўнта мае доступ нехта яшчэ: рэкамендуецца змяніць пошту і пароль.
