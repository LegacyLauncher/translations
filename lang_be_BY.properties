account.manager.multipane.add-account-ely.description.body=<img src="${image:logo-ely@16.png}" width="${size:16}" height="${size:16}" />&nbsp;<b>Ely.by</b> – бясплатная сістэма скінаў, якая ўключае ў сябе сэрвіс аўтарызацыі для гульцоў і ўладальнікаў сервераў.<br/><br/>&nbsp;Чаму мы рэкамендуем <b>Ely.by</b>?<br/>– Большасць карыстальнікаў Legacy Launcher убачыць Ваш скін!<br/>– З'явіцца магчымасць гуляць па лакальнай сетцы, проста націснуўшы «Адкрыць свет»!<br/><br/>Пры ўзнікненні праблем можаце выкарыстоўваць <a href=\"internal:tip:add-account-ely_legacy\">старую мадэль аўтарызацыі</a>.
