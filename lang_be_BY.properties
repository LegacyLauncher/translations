account.manager.error.minecraft.game_ownership=Для ўваходу ў акаўнт патрабуецца ліцэнзія Minecraft, але мы не змаглі праверыць наяўнасць копіі Minecraft на гэтым акаўнце. Калі вы ўпэўнены, што гэта памылка - паспрабуйце ўвайсці ў акаўнт праз афіцыйны лаўнчар.
