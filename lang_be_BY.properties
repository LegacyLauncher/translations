firstrun.notice.body.1=– Штосьці можа пайсці не так: мы стараемся гэтага пазбягаць, але дрэнныя рэчы ўсё ж здараюцца; мы не бярэм на сябе адказнасць за тое, як павядзе сябе Legacy Launcher у вас на камп'ютары
firstrun.notice.body.2=– Не забывайце, што Minecraft — гэта не бясплатная гульня; выкарыстоўваючы дадзенае ПЗ, Вы відавочна праяўляеце жаданне стаць уладальнікам прэміум-акаўнта. Калі-небудзь ¯\\_(ツ)_/¯
