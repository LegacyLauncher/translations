connectivity.warning.list.name.boot=Абнаўленне лаўнчара
connectivity.warning.list.hint.boot=Інфармацыя пра абнаўленні лаўнчара недаступная. Калі выйдзе новая версія, абнавіце лаўнчар самастойна.
connectivity.warning.list.name.official_repo_proxy=Люстэркі афіцыйнага рэпазіторыя Mojang
connectivity.warning.list.hint.official_repo_proxy.ok=Афіцыйны рэпазіторый даступны, таму люстэркі, хутчэй за ўсё, не спатрэбяцца.
connectivity.warning.list.hint.official_repo_proxy.not_ok=Усталёўка новых версій будзе складанай.
connectivity.warning.list.name.official_repo=Афіцыйны рэпазіторый Mojang
connectivity.warning.list.hint.official_repo.ok=Хутчэй за ўсё, будуць выкарыстаны люстэркі афіцыйнага рэпазіторыя.
connectivity.warning.list.hint.official_repo.not_ok=Ні афіцыйны рэпазіторый, ні яго люстэркі недаступныя. Усталёўка новых версій будзе складанай.
connectivity.warning.list.name.account.ely.by=Акаўнты Ely.by
connectivity.warning.list.hint.account.ely.by=Магчымыя праблемы з уваходам у акаўнты Ely
connectivity.warning.list.name.authserver.mojang.com=Сервер аўтэнтыфікацыі Mojang
connectivity.warning.list.hint.authserver.mojang.com=Аўтэнтыфікацыя Mojang недаступная.
connectivity.warning.list.hint.authserver.mojang.com.third_party=Магчыма, вы выкарыстоўваеце сэрвіс %0. Мы рэкамендуем адключыць яго, бо на дадзены момант ён падтрымліваецца толькі ў афіцыйным лаўнчары.
connectivity.warning.list.hint.authserver.mojang.com.third_party.unknown=Магчыма, вы выкарыстоўваеце старонні сэрвіс аўтэнтыфікацыі. Мы рэкамендуем адключыць яго, бо на дадзены момант такія сэрвісы падтрымліваюць пераважна толькі афіцыйны лаўнчар. Таксама гэтая памылка можа быць выклікана вашым антывірусам.
connectivity.warning.list.status.unreachable=Недаступна
connectivity.warning.list.status.waiting=Правяраем...
connectivity.warning.hosts.button=Спіс недаступных даменаў

macos.please-install-notification=Падобна на тое, што лаўнчар запушчаны з архіва. Усталюйце лаўнчар, перацягнуўшы яго іконку ў тэчку з праграмамі.

launcher.step.jarscanner=Праверка модаў на fractureiser...
jarscanner.takes-time=Падобна на тое, што сканіраванне зойме пэўны час. Мы робім гэта толькі адзін раз, каб гарантаваць бяспеку гульцоў. Націсніце «Так», каб працягнуць сканіраванне. Калі вы стаміліся чакаць, націсніце «Не».
jarscanner.detected=Утыліта выявіла fractureiser у адным з усталяваных модаў. Гэта вірус, які распаўсюджваўся разам з модамі для Minecraft. Вам варта звярнуцца па дапамогу: у галоўным меню лаўнчара вы знойдзеце нашы кантакты.

fractureiser.detected=Мы выявілі сляды шкоднаснай прапраграмы fractureiser, якая распаўсюджвалася разам з модамі для Minecraft. Вам варта звярнуцца па дапамогу: у галоўным меню лаўнчара вы знойдзеце нашы кантакты.
loginform.enter.blocked=Пачакайце…
launcher.step.logging-in=Выконваецца ўваход…
settings.jre.window.configure.wrapper-command=Каманда-абгортка
settings.jre.window.configure.wrapper-command.hint=Напрыклад: mangohud --dlsym %command%

opengl-pack.title=Пакет сумяшчальнасці OpenGL
opengl-pack.head=Перш чым мы пачнём...
opengl-pack.body=Для таго, каб запусціць Minecraft, у вашай сістэме павінен быць усталяваны пакет сумяшчальнасці OpenGL для працэсараў на платформе ARM.<br/><br/>Усталюйце яго, калі яшчэ гэтага не рабілі, або папрасіце гэта зрабіць адміністратара вашага камп'ютара.<br/><br/>Без пакета сумяшчальнасці гульня не запусціцца.
opengl-pack.button.countdown=Гэта важна (%0)
opengl-pack.button.install=Усталяваць

launcher.warning.arm64-no-native-support=Гэтая версія не падтрымлівае платформу ARM.
launcher.warning.arm64-no-native-support.manifest-unavailable=Мы не змаглі атрымаць спіс бібліятэк, якімі можна было б замяніць бібліятэкі гэтай версіі Minecraft, і зрабіць яе сумяшчальнай з платформай ARM.
launcher.warning.arm64-no-native-support.no-matches=Мы не змаглі знайсці падыходныя бібліятэкі, якімі можна было б замяніць бібліятэкі гэтай версіі Minecraft, і зрабіць яе сумяшчальнай з платформай ARM.
launcher.warning.arm64-no-native-support.will-continue=Працэс запуску будзе працягнуты, але гульня альбо не запусціцца, альбо будзе працаваць вельмі павольна.
