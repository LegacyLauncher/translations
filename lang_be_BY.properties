versions.notfound=Не ўдаецца атрымаць версіі з сервераў Minecraft. Магчымыя рашэнні:\n- Праверце падключэнне да сеткі Інтэрнэт\n- Праверце сістэмныя налады проксі, калі Вы падключаецеся да Інтэрнэту праз яго\n- Праверце налады антывіруса: паспрабуйце адключыць яго на час гульні, каб пацвердзіць апасенні.\n- Калі ў Вас наогул няма Інтэрнэту, можаце не звяртаць увагу на гэтае паведамленне.\n\nГэта, хутчэй за ўсё, лакальная праблема, таму некалькі разоў усё праверце, перш чым да кагосьці звяртацца.
