account.manager.error.mojang.migrated=Перайдзіце на сайт Minecraft.net, увайдзіце ў свой акаўнт, выкарыстоўваючы гэтыя ж даныя, і кіруйцеся далейшымі інструкцыямі.
account.manager.error.mcleaks.alt-token=Няправільны ALT-TOKEN.\nАтрымайце новы ALT-TOKEN у меню, якое адкрылася.
