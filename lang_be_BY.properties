auth.error.relogin.ely=Не ўдалося аўтарызавацца на серверы Ely, бо сервер адхіліў адпраўленыя даныя.\nАдкрыйце «Менеджар акаўнтаў» з дапамогай абразка налад у галоўным меню лаўнчара і стварыце акаўнт наноў.
auth.error.relogin.ely.editor=Няправільны лагін/пароль/токен. Праверце раскладку клавіятуры і паспрабуйце зноў.\nНа выпадак калі Вы забыліся пароль: <a href="https://ely.by/authorization/recoverPass">https://ely.by/authorization/recoverPass</a>
auth.error.relogin.mojang=Не ўдалося аўтарызавацца на серверы Mojang, бо сервер адхіліў адпраўленыя даныя.\nАдкрыйце «Менеджар акаўнтаў» з дапамогай абразка налад у галоўным меню лаўнчара і стварыце акаўнт наноў.
auth.error.relogin.mojang.editor=Няправільны лагін/пароль/токен. Праверце раскладку клавіятуры і паспрабуйце зноў.\nНа выпадак калі Вы забыліся пароль: <a href="https://account.mojang.com/password">https://account.mojang.com/password</a>\n\nКалі раней Вы маглі ўваходзіць без праблем і гэтая памылка здараецца занадта часта, неадкладна змяніце пароль і сакрэтныя пытанні ад Вашага акаўнта, бо яго маглі ўзламаць.
auth.error.migrated=Вы ўжо перайшлі на акаўнты Mojang. Замест імя карыстальніка ўвядзіце E-mail.
auth.error.internal=Адбылася ўнутраная памылка аўтарызацыі.
auth.error.unavailable=Сервер адказаў, што сэрвіс часова недаступны.
