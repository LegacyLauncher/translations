versions.damaged-json=Мы выявілі, што гэтая версія была пашкоджана староннім лаўнчарам і страціла некаторы функцыянал. Рэкамендуецца «Абнавіць кліент», каб аднавіць яе поўную працаздольнасць. Будуць наноў загружаны бібліятэкі, выканальныя і .json-файлы.\n\nВы хочаце правесці гэтую аперацыю?
