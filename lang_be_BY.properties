account.manager.error.minecraft.minecraft_services_auth=Не ўдалося атрымаць доступ да акаўнта Minecraft.
account.manager.error.minecraft.xsts_authentication=Не ўдалося аўтэнтыфікавацца на сэрвісах Xbox (XSTS). Хутчэй за ўсё, гэтая праблема звязана з тэхнічнымі работамі на серверах Xbox або сеткавымі праблемамі.
account.manager.error.minecraft.xsts_authentication.no_xbox_account=Да дадзенага акаўнта Microsoft не прывязаны акаўнт Xbox. Хутчэй за ўсё, вы выбралі не той акаўнт, на які зарэгістравана гульня. Калі вы ўпэўнены, што гэта памылка, паспрабуйце выкарыстоўваць афіцыйны лаўнчар.
account.manager.error.minecraft.xsts_authentication.country_not_authorized=Сэрвісы Xbox не працуюць у вашым рэгіёне.\nМагчыма, вы знаходзіцеся на тэрыторыі, якая падпадае пад дзеянне санкцый ЗША (напрыклад, Крым).\nПаспрабуйце выкарыстоўваць VPN.
account.manager.error.minecraft.xsts_authentication.child_account=Дадзены акаўнт належыць асобе маладзейшай за 18 гадоў. Выкарыстоўвайце афіцыйны лаўнчар для гульні з гэтага акаўнта.
