account.manager.error.mojang-migrated=Гэты акаўнт Mojang ужо мігрыраваў на акаўнты Microsoft. Выкарыстоўвайце акаўнт Microsoft для ўваходу.
account.manager.error.mojang-need-migration=Патрабуецца міграцыя.\nГэты акаўнт больш не можа быць выкарыстаны для сеткавай гульні (мультыплэера): яго трэба звязаць з акаўнтам Microsoft.

feedback.title=Пачакайце!
feedback.body=Мы разумеем, што вы, магчыма, спяшаецеся пакінуць гэтую праграму, але мы проста хацелі папрасіць вас прайсці невялікае апытанне. Нам вельмі важна ведаць, што вы думаеце пра Legacy Launcher!\n\nКалі ласка, удзяліце нам яшчэ пару хвілін.
