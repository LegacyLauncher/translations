account.manager.multipane.add-account-mcleaks.waiting.body=Калі ласка, пачакайце...<br/><br/>Мы павінны пераканацца ў тым, што серверы <img src="${image:logo-mcleaks@16.png}" width="${size:16}" height="${size:16}" />&nbsp;<b>MCLeaks</b> даступныя і могуць прымаць запыты.<br/><br/>Мы робім гэта ў фонавым рэжыме. Вы можаце пачакаць або вярнуцца сюды крыху пазней.
account.manager.multipane.add-account-mcleaks.waiting.button=Чаканне
account.manager.multipane.add-account-mcleaks.get_alt_token.body=<img src="${image:logo-mcleaks@16.png}" width="${size:16}" height="${size:16}" />&nbsp;<b>MCLeaks.net</b> не дае Вам лагін і пароль: замест гэтага ўсе запыты праксіруюцца, а для аўтарызацыі выкарыстоўваецца так званы <b>ALT-TOKEN</b>.<br/><br/>Атрымайце токен на сайце <b>MCLeaks</b>, вярніцеся ў лаўнчар і ўвядзіце яго ў спецыяльнае поле.
