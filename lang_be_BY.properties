auth.error.nousername=Калі ласка, ўвядзіце імя карыстальніка!
auth.tip.free=Выкарыстанне <b>бясплатных акаўнтаў</b> дазваляе Вам гуляць бясплатна і без прэміум-акаўнта. Вы можаце гуляць у адзіночнай гульні і на пірацкіх серверах. Каб бачыць скіны выкарыстоўвайце акаўнт Ely або <a href="https://minecraft.net/store/minecraft">набудзьце прэміум-акаўнт</a>.
auth.tip.mojang=<b>Прэміум-акаўнты (акаўнты Mojang)</b> дазваляюць гуляць Вам на афіцыйных серверах і бачыць скіны без дадатковай мадыфікацыі кліента. Вы можаце набыць яго <a href="https://minecraft.net/store/minecraft">на Minecraft.net</a>.
auth.tip.ely=<b>Акаўнт Ely</b>, у адрозненне ад бясплатнага, дазваляе Вам бачыць скіны іншых гульцоў. Для выкарыстання <a href="https://ely.by/?utm_source=Legacy Launcher&utm_medium=link&utm_term=accounts_page&utm_campaign=Legacy Launcher%20%D0%B0%D0%B2%D1%82%D0%BE%D1%80%D0%B8%D0%B7%D0%B0%D1%86%D0%B8%D1%8F">неабходная рэгістрацыя</a>.
