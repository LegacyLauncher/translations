account.manager.multipane.add-account-ely.get_ready.body=Выдатна!<br/><br/>А зараз пры націсканні на кнопку ў асобным акне адкрыецца Ваш браўзер па змаўчанні: Вы зможаце зарэгістравацца або аўтарызавацца ў сістэме <b>Ely.by</b>.<br/><br/>У далейшым кіруйцеся інструкцыямі на экране або ў выпадку няўдачы вярніцеся ў Legacy Launcher і націсніце «Не атрымліваецца».
